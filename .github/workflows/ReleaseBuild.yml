# documentation.

name: ReleaseBuild

on:
  push:
    branches:
      - main

env:
  # リポジトリのルートディレクトリを起点としたソリューションファイルのパス
  SOLUTION_FILE_PATH: Unnamed.slnx
  # Visual Studio の構成(Debug / Develop / Release)
  CONFIGURATION: Release
  PLATFORM: x64

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup premake
        uses: abel0b/setup-premake@v2.4
        with:
          version: "5.0.0-beta8"
          path: ./

      - name: Show files in the current directory
        shell: pwsh
        run: Get-ChildItem ./

      - name: Generate Visual Studio 2026 project files
        shell: pwsh
        run: .\premake5.exe vs2026

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Build
        shell: pwsh
        run: |
          $projects = @(
            ".\build\projects\TeamGameApp\TeamGameApp.vcxproj"
          )

          foreach ($project in $projects) {
            Write-Host "Building $project ($env:CONFIGURATION|$env:PLATFORM)"
            msbuild $project `
              /m:1 `
              /p:Configuration=$env:CONFIGURATION `
              /p:Platform=$env:PLATFORM
            if ($LASTEXITCODE -ne 0) {
              throw "Build failed: $project (exit=$LASTEXITCODE)"
            }
          }

      - name: Startup smoke validation
        shell: pwsh
        run: |
          $repoRoot = (Resolve-Path ".").Path

          $checks = @(
            @{ Exe = ".\bin\Release-windows-x86_64\TeamGameApp\TeamGameApp.exe"; Args = @("--repo-root=$repoRoot", "--validate-startup-only") }
          )

          foreach ($entry in $checks) {
            Write-Host "Running startup smoke: $($entry.Exe) $($entry.Args -join ' ')"
            $exePath = (Resolve-Path $entry.Exe).Path
            $process = Start-Process `
              -FilePath $exePath `
              -ArgumentList $entry.Args `
              -Wait `
              -PassThru `
              -WindowStyle Hidden
            $exitCode = $process.ExitCode
            if ($null -eq $exitCode) {
              $exitCode = 1
            }
            if ($exitCode -ne 0) {
              throw "Startup smoke failed: $($entry.Exe) (exit=$exitCode)"
            }
          }

