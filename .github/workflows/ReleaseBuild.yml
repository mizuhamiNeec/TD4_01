name: ReleaseBuild

on:
  push:
    branches:
      - main

env:
  # リポジトリのルートディレクトリを起点としたソリューションファイルのパス
  SOLUTION_FILE_PATH: Unnamed.slnx
  # Visual Studio の構成(DEBUG / Release)
  CONFIGURATION: Release
  PLATFORM: x64

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup premake
        uses: abel0b/setup-premake@v2.4
        with:
          version: "5.0.0-beta8"
          path: ./

      - name: Show files in the current directory
        run: ls ./

      - name: Generate Visual Studio 2026 project files
        shell: pwsh
        run: .\premake5.exe vs2026

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Build
        shell: pwsh
        run: |
          msbuild $env:SOLUTION_FILE_PATH `
            /m `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM
