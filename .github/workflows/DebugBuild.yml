# documentation.

name: DebugBuild

on:
  push:
    branches:
      - main

env:
  # リポジトリのルートディレクトリを起点としたソリューションファイルのパス
  SOLUTION_FILE_PATH: Unnamed.slnx
  # Visual Studio の構成(Debug / Develop / Release)
  CONFIGURATION: Debug
  PLATFORM: x64
  # premake5.lua で定義されたアプリプロジェクトをビルド
  BUILD_TARGETS: UnnamedEditorApp;ParkourGameApp;TeamGameApp

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup premake
        uses: abel0b/setup-premake@v2.4
        with:
          version: "5.0.0-beta8"
          path: ./

      - name: Show files in the current directory
        shell: pwsh
        run: Get-ChildItem ./

      - name: Generate Visual Studio 2026 project files
        shell: pwsh
        run: .\premake5.exe vs2026

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Build
        shell: pwsh
        run: |
          msbuild $env:SOLUTION_FILE_PATH `
            /m `
            /t:$env:BUILD_TARGETS `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM

      - name: Startup smoke validation
        shell: pwsh
        run: |
          $repoRoot = (Resolve-Path ".").Path

          $checks = @(
            @{ Exe = ".\bin\Debug-windows-x86_64\UnnamedEditorApp\UnnamedEditorApp.exe"; Args = @("--game=Parkour", "--repo-root=$repoRoot", "--validate-startup-only") },
            @{ Exe = ".\bin\Debug-windows-x86_64\UnnamedEditorApp\UnnamedEditorApp.exe"; Args = @("--game=TeamGame", "--repo-root=$repoRoot", "--validate-startup-only") },
            @{ Exe = ".\bin\Debug-windows-x86_64\ParkourGameApp\ParkourGameApp.exe"; Args = @("--repo-root=$repoRoot", "--validate-startup-only") },
            @{ Exe = ".\bin\Debug-windows-x86_64\TeamGameApp\TeamGameApp.exe"; Args = @("--repo-root=$repoRoot", "--validate-startup-only") }
          )

          foreach ($entry in $checks) {
            Write-Host "Running startup smoke: $($entry.Exe) $($entry.Args -join ' ')"
            & $entry.Exe @($entry.Args)
            if ($LASTEXITCODE -ne 0) {
              throw "Startup smoke failed: $($entry.Exe) (exit=$LASTEXITCODE)"
            }
          }
