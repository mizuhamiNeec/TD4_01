//-----------------------------------------------------------------------------
// KeyNameTable.cppに各キーに対応する名前が書いてあります。
//-----------------------------------------------------------------------------

// カーソルロックの切り替え
bind "escape" "togglelockcursor"

// コンソール
bind "`" "toggleconsole"

// 移動
bind "w" "+forward"
bind "s" "+back"
bind "a" "+moveleft"
bind "d" "+moveright"
// 上下移動はnoclipでのみ有効
bind "e" "+moveup"
bind "q" "+movedown"

// ジャンプ
bind "space" "+jump"

// スプリント
bind "shift" "+sprint"

// しゃがみ
bind "c" "+duck"
bind "ctrl" "+duck"

// 攻撃
bind "mouse1" "+attack1"
bind "mouse2" "+attack2"

// リロード
bind "r" "+reload"

bind "mwheelup" "+invprev"
bind "mwheeldown" "+invnext"

// Gamepad
bind "gp_a" "+jump"
bind "gp_b" "+duck"
bind "gp_ls" "+sprint"
bind "gp_rt" "+attack1"
bind "gp_lt" "+attack2"
bind "gp_x" "+reload"

// エディタ
bind "f1" "toggleeditor"
bind "4" "+bounds"
bind "1" "+translate"
bind "2" "+rotate"
bind "3" "+scale"
bind "tab" "+togglegizmo"
